server:
  port: 8080

spring:
  datasource:
    # 数据库连接配置
    url: jdbc:mysql://localhost:3306/health_diet?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456  # 请确保这里是你的 MySQL 密码
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 配置 (注意：data 必须和 datasource 平级，不能缩进在 datasource 里面)
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms

  # 文件上传限制配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB      # 单个文件限制
      max-request-size: 10MB  # 总请求限制

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 自定义文件保存路径 (对应 FileController 和 WebConfig)
file:
  upload-path: diet-uploads/

  # 浏览器访问图片的 URL 前缀
  access-path: /images/

# --- AI 模型配置 (新增) ---
ai:
  siliconflow:
    # 🔴 关键：去 https://cloud.siliconflow.cn/ 创建密钥并填在这里
    api-key: sk-zpfdjfqzhutjdccsyscdovmvbvqmwmkrwbaflrpzpedrmgri

    # 硅基流动的 API 地址 (兼容 OpenAI 格式)
    base-url: https://api.siliconflow.cn/v1/chat/completions

    # 模型名称：推荐 deepseek-ai/DeepSeek-V3 (便宜又强) 或 Qwen/Qwen2.5-7B-Instruct
    model: deepseek-ai/DeepSeek-V3